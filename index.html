<!DOCTYPE html>
<html>
<head>
  <title>Alleo PDF Maker 🚀</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ jsPDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #4a90e2;
      color: white;
      text-align: center;
    }

    .hero {
      padding: 60px 20px;
    }

    .tool {
      padding: 30px;
    }

    input, textarea, button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      width: 250px;
    }

    textarea {
      height: 80px;
    }

    button {
      background: white;
      color: #4a90e2;
      cursor: pointer;
    }

    button:hover {
      background: black;
      color: white;
    }

    .footer {
      background: black;
      padding: 40px;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>Welcome to Alleo 🚀</h1>
  <p>Create, Customize and Download Your PDF Easily</p>
</div>

<div class="tool">

  <h2>Create PDF 📄</h2>

  <input type="text" id="name" placeholder="PDF File Name"><br>

  <textarea id="text" placeholder="Write text for PDF..."></textarea><br>

  <button onclick="createPDF()">Create & Download PDF</button>

</div>

<script>
function createPDF() {
  const { jsPDF } = window.jspdf;

  let doc = new jsPDF();

  let text = document.getElementById("text").value;
  let name = document.getElementById("name").value || "alleo";

  if (!text) {
    alert("Write something first!");
    return;
  }

  doc.text(text, 10, 20);
  doc.save(name + ".pdf");
}
</script>

<div class="footer">
  <h2>Alleo PDF Maker 📄</h2>
  <p>Free and powerful PDF tool for everyone.</p>
  <p>© 2026 Alleo | All Rights Reserved 🔒</p>
</div>

</body>
</html>
